<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 500 - WikiLib</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .container { max-width: 500px; padding: 40px; }
        h1 { color: #dc3545; font-size: 5rem; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>500</h1>
        <h2>Error Interno del Servidor</h2>
        <p>¡Vaya! Algo ha salido mal en nuestros servidores. Estamos trabajando para solucionarlo.</p>
        <p th:if="${message}" style="font-size: 0.8rem; color: #999;">Detalle: <span th:text="${message}"></span></p>
        <a href="/" class="btn">Volver al Inicio</a>
    </div>
</body>
</html>
