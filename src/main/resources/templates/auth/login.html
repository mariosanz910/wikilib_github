<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WikiLib</title>

    <!-- Fuente elegante estilo clásico -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f2f5;
        }
        .card {
            width: 400px;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .title { text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h4 class="title">WikiLib - Iniciar Sesión</h4>

    <!-- Mensaje de error -->
    <div th:if="${param.error}" class="error">
        Usuario o contraseña incorrectos
    </div>

    <!-- Mensaje de logout -->
    <div th:if="${param.logout}" class="success">
        Sesión cerrada correctamente
    </div>

    <form th:action="@{/login}" method="post" style="padding: 0; background: none; border: none;">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- USUARIO -->
        <div class="field">
            <label>Nombre de Usuario</label>
            <input type="text" name="username" placeholder="Tu usuario" required>
        </div>

        <!-- CONTRASEÑA -->
        <div class="field">
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Tu contraseña" required>
        </div>

        <button class="btn" type="submit" style="width: 100%;">Entrar</button>

    </form>

    <div style="margin-top: 20px; text-align: center; font-size: 0.9em;">
        <p>¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a></p>
    </div>
</div>

</body>
</html>
