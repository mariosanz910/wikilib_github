<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Publicación - WikiLib</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div>
    <h2>Editar Publicación</h2>
    <a href="/redactor/panel">Volver al panel</a>
</div>

<hr>

<form th:action="@{/redactor/editar-publicacion/{id}(id=${publicacion.id})}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div>
        <label for="titulo">Título:</label><br>
        <input type="text" id="titulo" name="titulo" th:value="${publicacion.titulo}" required maxlength="200" style="width: 100%;">
    </div>
    <br>

    <div>
        <label for="categoriaId">Categoría:</label><br>
        <select id="categoriaId" name="categoriaId">
            <option value="">(Sin categoría)</option>
            <option th:each="cat : ${categorias}"
                    th:value="${cat.id}"
                    th:text="${cat.nombre}"
                    th:selected="${publicacion.categoria != null and publicacion.categoria.id == cat.id}">Categoría</option>
        </select>
    </div>
    <br>

    <div>
        <label for="descripcion">Descripción breve:</label><br>
        <textarea id="descripcion" name="descripcion" rows="3" style="width: 100%;" th:text="${publicacion.descripcion}"></textarea>
    </div>
    <br>

    <div>
        <label for="texto">Texto de la publicación:</label><br>
        <textarea id="texto" name="texto" rows="10" style="width: 100%;" th:text="${publicacion.texto}"></textarea>
    </div>
    <br>

    <button type="submit">Guardar cambios</button>
</form>

</body>
</html>
