<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Publicación - WikiLib</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Editar Publicación</h1>
        <a href="/redactor/panel" class="btn">Volver al panel</a>
    </div>

    <form th:action="@{/redactor/editar-publicacion/{id}(id=${publicacion.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div>
            <label for="titulo">Título:</label>
            <input type="text" id="titulo" name="titulo" th:value="${publicacion.titulo}" required maxlength="200">
        </div>

        <div>
            <label for="categoriaId">Categoría:</label>
            <select id="categoriaId" name="categoriaId">
                <option value="">(Sin categoría)</option>
                <option th:each="cat : ${categorias}"
                        th:value="${cat.id}"
                        th:text="${cat.nombre}"
                        th:selected="${publicacion.categoria != null and publicacion.categoria.id == cat.id}">Categoría</option>
            </select>
        </div>

        <div>
            <label for="descripcion">Descripción breve:</label>
            <textarea id="descripcion" name="descripcion" rows="3" th:text="${publicacion.descripcion}"></textarea>
        </div>

        <div>
            <label for="texto">Texto de la publicación:</label>
            <textarea id="texto" name="texto" rows="10" th:text="${publicacion.texto}"></textarea>
        </div>

        <button type="submit">Guardar cambios</button>
    </form>
</div>

</body>
</html>
