<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Revisión de Reportes - WikiLib</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Reportes Pendientes</h1>
        <a href="/admin/dashboard" class="btn">Volver al Panel</a>
    </div>

    <div th:if="${#lists.isEmpty(reportes)}">
        <p class="alert">No hay reportes pendientes.</p>
    </div>

    <div th:each="reporte : ${reportes}" class="post-card">
        <p><strong>Motivo:</strong> <span th:text="${reporte.motivo}"></span></p>
        <p><strong>Reportado por:</strong> <span th:text="${reporte.usuario.nombreUsuario}"></span> el <span th:text="${#temporals.format(reporte.fechaReporte, 'dd/MM/yyyy HH:mm')}"></span></p>
        <p>
            <strong>Publicación reportada:</strong> 
            <a th:href="@{/publicacion/{id}(id=${reporte.publicacion.id})}" target="_blank" th:text="${reporte.publicacion.titulo}">Ver publicación</a>
            (Autor: <span th:text="${reporte.publicacion.autor.nombreUsuario}"></span>)
        </p>

        <div style="margin-top: 15px;">
            <form th:action="@{/admin/reportes/{id}/resolver(id=${reporte.id})}" method="post" style="display: inline-block; margin-right: 10px; background: none; border: none; padding: 0; width: auto; max-width: none;">
                <input type="hidden" name="accion" value="DESCARTAR">
                <button type="submit" class="btn">Descartar</button>
            </form>
            
            <form th:action="@{/admin/reportes/{id}/resolver(id=${reporte.id})}" method="post" style="display: inline-block; background: none; border: none; padding: 0; width: auto; max-width: none;">
                <input type="hidden" name="accion" value="ELIMINAR_PUBLICACION">
                <button type="submit" class="btn btn-danger" onclick="return confirm('¿Seguro que deseas eliminar la publicación?');">
                    Eliminar Publicación
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
