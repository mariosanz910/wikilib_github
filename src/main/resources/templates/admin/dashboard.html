<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - WikiLib</title>

</head>
<body>

<div class="header">
    <h1>Panel de Administración</h1>
    <p>Bienvenido, <strong sec:authentication="name">Admin</strong>
        <span class="badge">ADMIN</span></p>
</div>

<div class="info">
    <h2>Estado del Proyecto</h2>
    <p><strong>Fase 1:</strong> Base de datos y sistema de autenticación - COMPLETADA</p>
</div>

<div class="info">
    <h2>Funcionalidades del Admin</h2>
    <ul>
        <li><a href="/admin/usuarios">Gestionar Usuarios</a></li>
        <li><a href="/admin/reportes">Revisar Reportes Pendientes</a></li>
        <li><a href="/admin/categorias">Gestionar Categorías</a></li>
    </ul>

    <a href="/login" class="logout-btn">Cerrar sesión</a>
</div>

</body>
</html>
