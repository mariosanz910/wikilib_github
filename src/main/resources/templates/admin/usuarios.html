<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - WikiLib</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Gestión de Usuarios</h1>
        <a href="/admin/dashboard" class="btn">Volver al Panel</a>
    </div>

    <!-- Filtro -->
    <form th:action="@{/admin/usuarios}" method="get" style="margin-bottom: 20px; max-width: 100%;">
        <label for="rol">Filtrar por rol:</label>
        <select name="rol" id="rol" style="width: auto; display: inline-block;">
            <option value="">Todos</option>
            <option value="USUARIO" th:selected="${filtroRol == 'USUARIO'}">Lector</option>
            <option value="REDACTOR" th:selected="${filtroRol == 'REDACTOR'}">Redactor</option>
        </select>
        <button type="submit">Filtrar</button>
    </form>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${usuarios}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.nombreUsuario}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.rol}"></td>
                    <td>
                        <span th:text="${user.estado}" 
                              th:style="${user.estado.name() == 'INACTIVO' ? 'color: #999; font-weight: bold;' : 'color: #000; font-weight: bold;'}"></span>
                    </td>
                    <td>
                        <form th:if="${user.rol.name() != 'ADMIN'}" 
                              th:action="@{/admin/usuarios/{id}/toggle-estado(id=${user.id})}" 
                              method="post" 
                              style="background: none; border: none; padding: 0; margin: 0; max-width: none;">
                            <button type="submit" 
                                    class="btn" 
                                    style="padding: 5px 10px; font-size: 0.75em;"
                                    th:text="${user.estado.name() == 'ACTIVO' ? 'Desactivar' : 'Activar'}"></button>
                        </form>
                        <span th:if="${user.rol.name() == 'ADMIN'}">No modificable</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
