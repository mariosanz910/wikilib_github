<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías - WikiLib</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Gestión de Categorías</h1>
        <a href="/admin/dashboard" class="btn">Volver al Panel</a>
    </div>

    <div style="margin-bottom: 30px;">
        <h3>Añadir Nueva Categoría</h3>
        <form th:action="@{/admin/categorias/nueva}" method="post">
            <div>
                <label>Nombre:</label>
                <input type="text" name="nombre" required>
            </div>
            <div style="margin-top: 10px;">
                <label>Descripción:</label>
                <textarea name="descripcion"></textarea>
            </div>
            <button type="submit">Añadir Categoría</button>
        </form>
    </div>

    <h3>Categorías Existentes</h3>
    <ul style="list-style: none; padding: 0;">
        <li th:each="cat : ${categorias}" class="post-card">
            <strong th:text="${cat.nombre}"></strong> - <span th:text="${cat.descripcion}"></span>
        </li>
    </ul>
</div>

</body>
</html>
